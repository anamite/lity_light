# --- Lity - single source of runtime configuration ---------------------------
name: Lity
workspace: ./workspace
database: ./data/lity.db

user:
  # The human side of the clock. Re-read live — no restart.
  timezone: ""                 # IANA name, e.g. Europe/Berlin; blank = system tz.
                               # Governs the kernel's clock, daily:/weekly:
                               # schedules, goal reviews and reflection time.
  quiet_hours: ""              # e.g. "23:00-07:30" (local; overnight OK).
                               # During quiet hours nothing is spoken aloud and
                               # the heartbeat rests; proactive messages land
                               # silently in the UI for the morning. Blank = off.

reflection:
  # Nightly reflection (utility model, runs once per night at `time`):
  # 1) memory consolidation — archives duplicate/superseded memories, writes
  #    merged replacements (never deletes); 2) day review — digests the last
  #    24h and wakes the kernel if something deserves a follow-up (a goal,
  #    a schedule, a memory). Re-read live.
  enabled: true
  time: "03:30"                # user-local; ideally inside quiet_hours

provider:
  base_url: https://api.openai.com/v1         # swap to http://localhost:11434/v1 for Ollama
  api_key_env: OPENAI_API_KEY                 # key itself lives in .env / environment

models:
  main: gpt-5.4-mini                          # kernel - small & cheap by design
  utility: gpt-5.4-mini                       # summaries, memory extraction, heartbeat
  vision: gpt-5.4-mini                        # used when images are involved (falls back to main)

kernel:
  max_window_messages: 20      # verbatim messages kept in context
  compact_after_messages: 26   # compaction trigger (keeps last keep_recent verbatim)
  keep_recent: 10
  memory_inject_top_k: 5
  max_tool_iterations: 8
  system_char_budget: 6400     # ~1.6k tokens across all system slots
  vision_max_images: 2         # newest N attached images embedded into context

skills:
  enabled: true                # distill reusable lessons after delegated tasks
  inject_top_k: 2

autonomy_level: 2              # tool levels <= this run without asking; 4 always asks
approval_timeout_seconds: 600  # a timed-out (or denied) approval STOPS the task
approval_nag_seconds: 60       # task waiting on approval this long -> kernel nudges the user

heartbeat:
  enabled: true
  interval_minutes: 30

scheduler:
  tick_seconds: 30

hermes:
  # THE executor. Every delegated task runs on an external Hermes Agent via its
  # runs API - Lity itself only chats, remembers, schedules and orchestrates.
  # Requires `hermes gateway` running with API_SERVER_ENABLED=true.
  # Same host: http://127.0.0.1:8642 - Hermes on another machine: its LAN IP,
  # e.g. http://192.168.0.3:8642
  enabled: true
  base_url: http://127.0.0.1:8642
  api_key_env: HERMES_API_KEY  # = API_SERVER_KEY of the Hermes gateway; put in .env
  result_max_chars: 1200       # longer task results get compressed before
                               # entering the parent thread (~300 tokens)

quick:
  # Local quick tools: timers/alarms, notes, shopping lists, weather.
  ring_seconds: 60             # how long a fired timer/alarm rings before auto-silencing
  beep: true                   # audible beep on this machine's speaker (winsound / aplay)
  default_city: ""             # weather fallback when the user names no city
  alsa_card:                   # blank = auto-detect the card with a playback volume
  alsa_control:                # blank = auto (Speaker / PCM / Master / Headphone);
                               # inspect with `amixer -c <n> scontrols`

voice:
  # In-process voice assistant (wake word -> Speechmatics STT -> kernel ->
  # local Kokoro TTS). Needs the voice extras (install.sh asks) and
  # SPEECHMATICS_API_KEY in .env. Enable here, or per-run with
  # `python -m lity --voice` / `./lityctl start --voice`.
  enabled: false
  wake_word: hey_jarvis        # openWakeWord builtins: hey_jarvis, alexa, hey_mycroft, hey_rhasspy
  wake_threshold: 0.5          # 0-1; raise to reduce false triggers
  wake_listen_seconds: 8       # after wake, how long to wait for speech
  followup_seconds: 3          # after the bot replies, mic stays open this long
  processing_timeout_seconds: 30  # no reply after this -> relock the mic
  eou_silence_trigger: 1.5     # max mid-sentence pause (s) before the turn ends
  speech_gap_seconds: 1.0      # bot audio gaps shorter than this don't reopen the
                               # mic (cloud TTS pauses between sentences)
  language: en
  tts_engine: kokoro           # kokoro (local, free, slower on a Pi) |
                               # resemble (Resemble AI cloud, needs RESEMBLE_API_KEY in .env) |
                               # openai (gpt-4o-mini-tts, needs OPENAI_API_KEY in .env)
  tts_voice: af_heart          # Kokoro voice id
  resemble_voice: ""           # Resemble voice UUID (app.resemble.ai/hub/voices)
  openai_tts_voice: nova       # alloy, ash, ballad, coral, echo, fable, nova, onyx, sage, shimmer
  openai_tts_model: gpt-4o-mini-tts
  speak_text_replies: false    # false = replies to TYPED (web UI) input stay on
                               # screen, not spoken (voice input + task results are
                               # always spoken). Read LIVE — toggle anytime with
                               # ./lityctl set voice.speak_text_replies true, or
                               # tell Lity "speak your replies to my texts too".
  input_device_index:          # blank = system default; list with ./lityctl devices
  output_device_index:

# ── External modules (optional integrations; each is its own section) ────────
gcal:
  # Google Calendar. Auth is a Google SERVICE ACCOUNT (robot account) — no
  # browser login on this machine. Setup: ask Lity "set up google calendar"
  # (the assistant has the manual), or ./lityctl setup step 6. This section is
  # re-read live on every call: changes here need NO restart.
  enabled: false
  calendar_id: ""              # the calendar to use — usually your gmail address
  service_account_file: data/gcal_service_account.json
  inject_daily: always         # always = today's events in the assistant's context
                               # every turn | on_demand = fetched only via the tool
  timezone: ""                 # IANA name, e.g. Europe/Berlin; blank = system tz

env:
  # Environment awareness — Lity's senses (and hands) in the physical world.
  # A hub of drivers polled every poll_seconds; the latest snapshot feeds the
  # heartbeat and the `environment` tool, driver alerts and watched state
  # CHANGES wake the kernel as system events. Section is re-read live — no
  # restart. Future drivers (zigbee2mqtt direct, desk motor, display, email
  # watcher) plug into lity/modules/env.py with the same shape.
  poll_seconds: 60
  system:                      # this machine (the Pi): always on, read-only
    enabled: true
    disk_alert_percent: 90     # alert when the disk is this % full
    temp_alert_c: 80           # alert when the CPU reaches this temperature
  homeassistant:
    # Home Assistant = eyes and hands for the smart home: the Zigbee mesh
    # (ZHA / zigbee2mqtt), lights, switches, sensors, locks... Create a
    # long-lived access token in HA (your profile -> Security), put it in
    # .env as HASS_TOKEN, set base_url, flip enabled.
    enabled: false
    base_url: http://homeassistant.local:8123
    token_env: HASS_TOKEN
    watch: []                  # entity ids or prefixes ("light.") to observe;
                               # [] = lights, switches, binary_sensors, locks,
                               # climate, media_players, persons, covers
    announce: []               # entities whose state CHANGES wake the kernel,
                               # e.g. ["binary_sensor.front_door", "person."]

telegram:
  # Telegram bridge. Create a bot with @BotFather, put its token in .env as
  # TELEGRAM_BOT_TOKEN, then ./lityctl setup step 6 pairs your chat id
  # automatically. Only that chat is ever answered. Section is re-read live —
  # no restart. Incoming texts arrive tagged [via Telegram]; replies go back
  # there silently. Outbound sends happen only via the telegram tool on request.
  enabled: false
  chat_id: ""                  # your personal chat with the bot (wizard fills this)
  forward_approvals: true      # approval requests also appear there with decision buttons

server:
  host: 0.0.0.0
  port: 8321
