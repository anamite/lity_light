<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000; --bg-soft:#0a0a0a;
    --side:#0a0a0a; --panel:#0e0e0e; --panel2:#151515; --panel3:#1c1c1c;
    --line:#282828; --line-soft:#1c1c1c;
    --text:#dcdcdc; --text-hi:#ffffff; --dim:#868686; --dim2:#525252;
    --accent:#4a6273; --accent-dim:#374b59; --accent-hi:#5e7f94;
    --accent-glow:rgba(74,98,115,.28);
    --ok:#4ade80; --warn:#c98a4b; --bad:#c9564f; --agent:#8a86a8;
    --font-ui:'Manrope',system-ui,sans-serif;
    --font-head:'Sora',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
    --radius:10px; --radius-lg:14px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
    --shadow-md:0 8px 24px rgba(0,0,0,.55);
    --shadow-float:0 16px 40px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  ::selection{background:var(--accent-glow);color:var(--text-hi)}
  body{background:var(--bg);color:var(--text);font:15px/1.55 var(--font-ui);
       display:flex;height:100vh;overflow:hidden;
  }

  /* ── custom scrollbars everywhere ── */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--panel3);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--dim2);border:2px solid transparent;background-clip:padding-box}
  *{scrollbar-width:thin;scrollbar-color:var(--panel3) transparent}

  svg.ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;
         stroke-linecap:round;stroke-linejoin:round;display:block;flex-shrink:0}

  /* ── sidebar ── */
  #side{width:272px;min-width:272px;background:var(--side);border-right:1px solid var(--line);
        display:flex;flex-direction:column}
  #side h1{font:800 16px/1 var(--font-head);padding:18px 16px 4px;color:var(--text-hi);
           letter-spacing:.3px;display:flex;align-items:center;gap:9px}
  #side h1 .mark{width:24px;height:24px;border-radius:7px;
      background:var(--accent);
      display:flex;align-items:center;justify-content:center;color:var(--text-hi);
      font:800 13px var(--font-head);box-shadow:0 0 0 1px rgba(255,255,255,.06),var(--shadow-sm)}
  #side h1 small{color:var(--dim);font:500 11px var(--font-ui);margin-left:1px}
  .sect{padding:18px 16px 8px;font:700 10.5px var(--font-head);text-transform:uppercase;
        letter-spacing:1.4px;color:var(--dim2)}
  #threads{overflow-y:auto;flex:1;padding:0 8px}
  .thread{padding:8px 12px;cursor:pointer;border-radius:8px;margin-bottom:2px;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13.5px;
          color:var(--text);display:flex;align-items:center;gap:6px;
          border:1px solid transparent;transition:background .12s,border-color .12s}
  .thread:hover{background:var(--panel2)}
  .thread.active{background:var(--panel2);border-color:var(--line)}
  .thread.kind-agent{color:var(--agent);padding-left:22px;font-size:12.5px}
  .thread .badge{font:600 9.5px var(--font-mono);color:var(--dim);margin-left:auto;
                 background:var(--panel3);padding:1px 6px;border-radius:5px;letter-spacing:.4px;
                 flex-shrink:0}
  .thread .home-ic{width:15px;height:15px;color:var(--dim);flex-shrink:0;stroke-width:2}
  .thread.active .home-ic{color:var(--accent)}
  .thread .thread-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #tasks{border-top:1px solid var(--line);max-height:30vh;overflow-y:auto;padding:4px 8px 10px;margin-top:6px}
  .task{margin:6px 4px 0;padding:8px 10px;background:var(--panel2);border-radius:9px;
        border:1px solid var(--line-soft);
        font-size:11.5px;color:var(--dim);cursor:pointer;transition:border-color .15s,transform .1s}
  .task:hover{border-color:var(--accent-dim);transform:translateY(-1px)}
  .task b{color:var(--text);font:600 12px var(--font-ui)}
  .st-running{color:var(--warn)} .st-done{color:var(--ok)} .st-failed{color:var(--bad)}
  .st-blocked{color:var(--bad);font-weight:700}
  .st-running,.st-done,.st-failed,.st-blocked{font:700 10px var(--font-mono);
      text-transform:uppercase;letter-spacing:.4px}

  /* ── main ── */
  #main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  #head{padding:13px 22px;border-bottom:1px solid var(--line);display:flex;
        align-items:center;gap:10px;background:var(--panel);backdrop-filter:blur(6px)}
  #head #title{font:700 14.5px var(--font-head);color:var(--text-hi);letter-spacing:.2px}
  #gear{margin-left:auto;cursor:pointer;color:var(--dim);border:1px solid transparent;
        background:none;padding:7px;border-radius:8px;display:flex;transition:all .15s}
  #gear:hover{color:var(--text-hi);background:var(--panel2);border-color:var(--line)}
  #conn{width:8px;height:8px;border-radius:50%;background:var(--bad);
        box-shadow:0 0 6px var(--bad);flex-shrink:0;transition:background .3s,box-shadow .3s}
  #conn.on{background:var(--ok);box-shadow:0 0 6px var(--ok)}
  #log{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:12px;
       scroll-behavior:smooth}
  .msg{max-width:74%;padding:11px 15px;border-radius:14px;white-space:pre-wrap;
       word-break:break-word;font-size:14px;line-height:1.55;box-shadow:var(--shadow-sm);
       animation:rise .18s ease-out}
  @keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .msg.user{align-self:flex-end;background:var(--accent-dim);color:var(--text-hi);
            border-bottom-right-radius:4px}
  .msg.assistant{align-self:flex-start;background:var(--panel2);border:1px solid var(--line-soft);
                 border-bottom-left-radius:4px}
  .msg.event{align-self:center;background:none;color:var(--dim);font-size:11.5px;
             max-width:92%;padding:3px 10px;font-family:var(--font-mono);box-shadow:none;
             opacity:.8}
  .msg img{max-width:100%;max-height:340px;border-radius:10px;display:block;margin-top:8px;
           border:1px solid var(--line)}
  .msg a.file{display:inline-flex;align-items:center;gap:6px;margin-top:8px;color:var(--accent);
              text-decoration:none;border:1px solid var(--line);border-radius:9px;
              padding:6px 12px;font-size:12.5px;font-weight:600;background:var(--panel3);
              transition:border-color .15s}
  .msg a.file:hover{border-color:var(--accent-dim)}
  .approval{align-self:center;background:var(--panel2);border:1px solid var(--warn);
            border-radius:var(--radius-lg);padding:14px 18px;max-width:88%;font-size:13px;
            box-shadow:0 0 0 1px rgba(232,185,94,.08),var(--shadow-md)}
  .approval .tool{color:var(--warn);font-weight:700;font-family:var(--font-mono);font-size:12.5px}
  .approval pre{color:var(--dim);margin:8px 0;white-space:pre-wrap;font-family:var(--font-mono);
                font-size:11.5px;max-height:100px;overflow:auto;background:var(--panel);
                padding:8px 10px;border-radius:8px;border:1px solid var(--line-soft)}
  .approval button{margin-right:8px;margin-top:6px;padding:6px 15px;border-radius:8px;
                   border:1px solid var(--line);background:var(--panel3);color:var(--text);
                   cursor:pointer;font:600 12.5px var(--font-ui);transition:all .15s}
  .approval button.yes{border-color:var(--ok);color:var(--ok)}
  .approval button.no{border-color:var(--bad);color:var(--bad)}
  .approval button:hover{filter:brightness(1.25);transform:translateY(-1px)}
  #composer{display:flex;gap:10px;padding:10px 22px 20px;
            align-items:flex-end;background:transparent}
  #attach{background:var(--panel2);border:1px solid var(--line);border-radius:50%;
          color:var(--dim);cursor:pointer;width:46px;height:46px;flex-shrink:0;
          display:flex;align-items:center;justify-content:center;transition:all .15s;
          box-shadow:var(--shadow-float)}
  #attach:hover{color:var(--text-hi);border-color:var(--dim2)}
  #input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:16px;
         color:var(--text);padding:13px 16px;font:14px/1.5 var(--font-ui);resize:none;
         height:46px;transition:border-color .15s,box-shadow .15s;
         box-shadow:var(--shadow-float)}
  #input::placeholder{color:var(--dim2)}
  #input:focus{outline:none;border-color:var(--accent);
      box-shadow:var(--shadow-float),0 0 0 3px var(--accent-glow)}
  #send{width:46px;height:46px;flex-shrink:0;border-radius:50%;border:1px solid var(--accent-dim);
        background:var(--accent);
        color:var(--text-hi);cursor:pointer;display:flex;
        align-items:center;justify-content:center;transition:filter .15s,transform .1s;
        box-shadow:var(--shadow-float)}
  #send .ic{width:18px;height:18px}
  #send:hover{filter:brightness(1.2)}
  #send:active{transform:scale(.93)}
  #send:disabled{opacity:.35;cursor:not-allowed}
  .typing{color:var(--dim);font-size:12.5px;align-self:flex-start;padding:2px 6px;
          display:flex;align-items:center;gap:6px;font-style:italic}
  .typing::after{content:'';display:block;width:5px;height:5px;border-radius:50%;
      background:var(--dim);box-shadow:8px 0 var(--dim),16px 0 var(--dim);
      animation:dots 1.1s infinite ease-in-out}
  @keyframes dots{0%,100%{opacity:.25}50%{opacity:.9}}

  /* ── settings ── */
  #settings{display:none;flex:1;overflow-y:auto;padding:24px 28px}
  #settings.open{display:block}
  #tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;background:var(--panel);
        padding:5px;border-radius:12px;border:1px solid var(--line);width:fit-content}
  #tabs button{padding:8px 18px;border-radius:8px;border:none;
               background:transparent;color:var(--dim);cursor:pointer;
               font:600 12.5px var(--font-ui);transition:all .15s}
  #tabs button:hover{color:var(--text)}
  #tabs button.on{background:var(--panel3);color:var(--accent);box-shadow:var(--shadow-sm)}
  .pane{display:none} .pane.on{display:block;animation:rise .16s ease-out}
  .pane h3{font:700 14px var(--font-head);margin:18px 0 8px;color:var(--text-hi);
           letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .pane h3::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px}
  .pane p.hint{color:var(--dim);font-size:12.5px;margin-bottom:10px;line-height:1.6;max-width:70ch}
  textarea.ed{width:100%;min-height:240px;background:var(--panel);color:var(--text);
              border:1px solid var(--line);border-radius:var(--radius);padding:14px;
              font:13px/1.6 var(--font-mono);resize:vertical;transition:border-color .15s}
  textarea.ed:focus{outline:none;border-color:var(--accent-dim);box-shadow:0 0 0 3px var(--accent-glow)}
  textarea.ed.small{min-height:130px}
  .savebtn{margin:10px 0 20px;padding:8px 20px;border-radius:9px;
           border:1px solid var(--accent-dim);background:var(--accent);
           color:var(--text-hi);font:700 12.5px var(--font-ui);cursor:pointer;
           transition:filter .15s,transform .1s}
  .savebtn:hover{filter:brightness(1.15)}
  .savebtn:active{transform:scale(.97)}
  #toast{position:fixed;bottom:20px;right:20px;background:var(--panel3);
         border:1px solid var(--ok);border-radius:var(--radius);padding:11px 20px;
         display:none;font:600 12.5px var(--font-ui);z-index:9;box-shadow:var(--shadow-md);
         color:var(--text-hi)}
  #toast.err{border-color:var(--bad)}
  table.tools{width:100%;border-collapse:collapse;font-size:12.5px;
              border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  table.tools td,table.tools th{padding:9px 12px;border-bottom:1px solid var(--line-soft);
                                text-align:left;vertical-align:top}
  table.tools th{color:var(--dim);font-weight:700;background:var(--panel2);
                 font-size:10.5px;text-transform:uppercase;letter-spacing:.6px}
  table.tools tr:hover td{background:var(--panel2)}
  table.tools td b{font-family:var(--font-mono);color:var(--text-hi);font-size:12px}
  .lvl{display:inline-block;min-width:22px;text-align:center;border-radius:6px;
       background:var(--panel3);padding:2px 7px;font:700 11px var(--font-mono);color:var(--dim)}
  .lvl.l3,.lvl.l4{color:var(--warn);background:rgba(232,185,94,.12)}
  .direct{color:var(--ok);font:700 10.5px var(--font-mono);text-transform:uppercase;letter-spacing:.4px}
</style>
</head>
<body>
<aside id="side">
  <h1><span class="mark">L</span>Lity <small>lightweight agent</small></h1>
  <div class="sect">Threads</div>
  <div id="threads"></div>
  <div class="sect">Tasks</div>
  <div id="tasks"></div>
</aside>
<main id="main">
  <div id="head">
    <span id="title">Home</span><span id="conn" title="live connection"></span>
    <button id="gear" title="settings">
      <svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div id="log"></div>
  <div id="settings">
    <div id="tabs">
      <button data-pane="config" class="on">Config</button>
      <button data-pane="files">Identity files</button>
      <button data-pane="skills">Skills</button>
      <button data-pane="tools">Tools</button>
    </div>
    <div class="pane on" id="pane-config">
      <p class="hint">config.yaml — models, budgets, autonomy level, heartbeat. Applied
      immediately on save (server host/port need a restart).</p>
      <textarea class="ed" id="cfg-ed" spellcheck="false"></textarea>
      <button class="savebtn" onclick="saveConfig()">Save config</button>
    </div>
    <div class="pane" id="pane-files"></div>
    <div class="pane" id="pane-skills"></div>
    <div class="pane" id="pane-tools"></div>
  </div>
  <div id="composer">
    <button id="attach" title="send a file">
      <svg class="ic" viewBox="0 0 24 24"><path d="M21.44 11.05 12.25 20.24a5.5 5.5 0 0 1-7.78-7.78l9.19-9.19a3.67 3.67 0 0 1 5.19 5.19L9.66 17.65a1.83 1.83 0 0 1-2.6-2.6l8.49-8.49"/></svg>
    </button>
    <input type="file" id="fileinput" hidden>
    <textarea id="input" placeholder="Message Lity… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send" title="send">
      <svg class="ic" viewBox="0 0 24 24" stroke-width="2.2"><path d="M12 19V6.5"/><path d="M6 12.5 12 6l6 6.5"/></svg>
    </button>
  </div>
</main>
<div id="toast"></div>
<script>
const $ = s => document.querySelector(s);
let current = 1, threads = [], readonly = false;

const api = (path, opts) => fetch('/api'+path, opts ? {
  method: opts._method || 'POST', headers:{'Content-Type':'application/json'},
  body: JSON.stringify(Object.fromEntries(Object.entries(opts).filter(([k])=>k!=='_method')))
} : undefined).then(async r => {
  if(!r.ok){ let d=''; try{ d=(await r.json()).detail }catch(e){} throw new Error(d||r.status); }
  return r.json();
});

function toast(msg, err){
  const t = $('#toast'); t.textContent = msg; t.className = err ? 'err' : '';
  t.style.display='block'; setTimeout(()=>t.style.display='none', 2600);
}

/* ── rendering ── */
function msgEl(m){
  const d = document.createElement('div');
  d.className = 'msg ' + (m.role==='tool' ? 'event' : m.role);
  d.textContent = m.role==='event' ? '⚙ '+m.content : m.content;
  let att = m.attachment;
  if(typeof att === 'string' && att) { try{ att = JSON.parse(att) }catch(e){ att=null } }
  if(att && att.path){
    if((att.mime||'').startsWith('image/')){
      const img = document.createElement('img');
      img.src = '/api/files/'+att.path; img.alt = att.name;
      img.onclick = () => window.open(img.src);
      d.appendChild(img);
    } else {
      const a = document.createElement('a');
      a.className='file'; a.href='/api/files/'+att.path; a.download=att.name;
      a.textContent='📎 '+att.name;
      d.appendChild(a);
    }
  }
  return d;
}
function scroll(){ const l=$('#log'); l.scrollTop = l.scrollHeight; }

async function loadThreads(){
  threads = await api('/threads');
  const box = $('#threads'); box.innerHTML = '';
  for(const t of threads){
    const d = document.createElement('div');
    d.className = 'thread kind-'+t.kind + (t.id===current?' active':'');
    if(t.id===1){
      d.insertAdjacentHTML('beforeend',
        '<svg class="ic home-ic" viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-9"/><path d="M9.5 20v-6a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v6"/></svg>');
    }
    const label = document.createElement('span');
    label.className = 'thread-label'; label.textContent = t.title;
    d.appendChild(label);
    if(t.kind==='agent'){
      const badge = document.createElement('span');
      badge.className = 'badge'; badge.textContent = 'agent';
      d.appendChild(badge);
    }
    d.onclick = () => { closeSettings(); openThread(t.id); };
    box.appendChild(d);
  }
}
async function openThread(id){
  current = id;
  const t = threads.find(x=>x.id===id);
  $('#title').textContent = t ? t.title : 'Thread '+id;
  readonly = t && t.kind==='agent';
  $('#input').disabled = readonly; $('#send').disabled = readonly;
  $('#input').placeholder = readonly ? 'Agent thread — read-only'
      : 'Message Lity… (Enter to send, Shift+Enter for newline)';
  const msgs = await api(`/threads/${id}/messages`);
  const log = $('#log'); log.innerHTML = '';
  msgs.forEach(m => log.appendChild(msgEl(m)));
  await renderPendingApprovals();  // pending approvals survive reloads & thread switches
  loadThreads(); scroll();
}
async function loadTasks(){
  const tasks = await api('/tasks');
  const box = $('#tasks'); box.innerHTML = '';
  for(const t of tasks.slice(0,12)){
    const d = document.createElement('div'); d.className='task';
    d.innerHTML = `<b>#${t.id} ${t.agent}</b> <span class="st-${t.status}">${t.status}</span><br>${t.task.slice(0,60)}`;
    d.onclick = () => { closeSettings(); openThread(t.thread_id); };
    box.appendChild(d);
  }
}
function approvalCard(ev){
  // one card per approval id — never duplicate
  if(document.querySelector(`[data-aid="${ev.id}"]`)) return null;
  const d = document.createElement('div'); d.className='approval'; d.dataset.aid = ev.id;
  d.innerHTML = `Permission needed (level ${ev.level}): <span class="tool">${ev.tool}</span>
    <pre>${JSON.stringify(ev.args,null,1)}</pre>
    <div style="color:var(--dim);font-size:12px;margin-bottom:4px">The task is paused until you decide — denying stops it.</div>`;
  for(const [label,cls,dec] of [['Approve','yes','approve'],['Always allow','yes','always'],['Deny','no','deny']]){
    const b = document.createElement('button'); b.textContent=label; b.className=cls;
    b.onclick = async () => { try{ await api('/approvals/'+ev.id,{decision:dec}); }catch(e){} d.remove(); };
    d.appendChild(b);
  }
  return d;
}
async function renderPendingApprovals(){
  try{
    const pend = await api('/approvals');
    for(const p of pend){
      const card = approvalCard({id:p.id, tool:p.tool, level:p.level,
                                 args:JSON.parse(p.args_json||'{}')});
      if(card){ $('#log').appendChild(card); }
    }
    if(pend.length) scroll();
  }catch(e){}
}

/* ── live events ── */
function connect(){
  const es = new EventSource('/api/events');
  es.onopen  = () => $('#conn').classList.add('on');
  es.onerror = () => { $('#conn').classList.remove('on'); };
  es.onmessage = e => {
    const ev = JSON.parse(e.data);
    if(ev.type==='message.created'){
      if(ev.thread_id===current){ $('#log').appendChild(msgEl(ev)); scroll(); }
      hideTyping(ev);
    }
    else if(ev.type==='thread.created'){ loadThreads(); }
    else if(ev.type==='task.updated'){ loadTasks(); }
    else if(ev.type==='approval.requested'){
      const card = approvalCard(ev);
      if(card){ $('#log').appendChild(card); scroll(); }
    }
    else if(ev.type==='approval.resolved'){
      document.querySelectorAll(`[data-aid="${ev.id}"]`).forEach(x=>x.remove());
    }
  };
}
let typingEl = null;
function showTyping(){ if(typingEl) return;
  typingEl = document.createElement('div'); typingEl.className='typing';
  typingEl.textContent='Lity is thinking…'; $('#log').appendChild(typingEl); scroll(); }
function hideTyping(ev){ if(typingEl && ev.role==='assistant' && ev.thread_id===current){
  typingEl.remove(); typingEl=null; } }

/* ── composing & files ── */
async function send(){
  const text = $('#input').value.trim();
  if(!text || readonly) return;
  $('#input').value='';
  await api(`/threads/${current}/messages`, {content:text});
  showTyping();
}
$('#send').onclick = send;
$('#input').addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
$('#attach').onclick = () => { if(!readonly) $('#fileinput').click(); };
$('#fileinput').onchange = async () => {
  const f = $('#fileinput').files[0];
  if(!f) return;
  const fd = new FormData();
  fd.append('file', f);
  fd.append('caption', $('#input').value.trim());
  $('#input').value=''; $('#fileinput').value='';
  const r = await fetch(`/api/threads/${current}/files`, {method:'POST', body:fd});
  if(r.ok){ showTyping(); } else { toast('upload failed', true); }
};
/* ── settings dashboard ── */
let settingsOpen = false;
function closeSettings(){
  settingsOpen = false;
  $('#settings').classList.remove('open');
  $('#log').style.display='flex'; $('#composer').style.display='flex';
  $('#title').textContent = (threads.find(x=>x.id===current)||{title:'Home'}).title;
}
$('#gear').onclick = async () => {
  if(settingsOpen) return closeSettings();
  settingsOpen = true;
  $('#log').style.display='none'; $('#composer').style.display='none';
  $('#settings').classList.add('open');
  $('#title').textContent = 'Settings';
  const s = await api('/settings');
  $('#cfg-ed').value = s.config_yaml;

  const fp = $('#pane-files'); fp.innerHTML='';
  for(const [name, content] of Object.entries(s.files)){
    fp.insertAdjacentHTML('beforeend', `<h3>${name}</h3>`);
    const ta = document.createElement('textarea');
    ta.className='ed small'; ta.value=content; ta.spellcheck=false;
    const b = document.createElement('button'); b.className='savebtn'; b.textContent='Save '+name;
    b.onclick = async () => {
      try{ await api('/settings/file', {_method:'PUT', name, content: ta.value});
           toast(name+' saved'); }catch(e){ toast(e.message, true); }
    };
    fp.appendChild(ta); fp.appendChild(b);
  }

  const skills = await api('/skills');
  $('#pane-skills').innerHTML =
    '<p class="hint">Lessons distilled from completed Hermes tasks; refined in place when '+
    'repeated. Delete anything wrong or stale.</p>'+
    (skills.length ? '' : '<p class="hint">(no skills learned yet — they appear after delegated tasks complete)</p>');
  for(const sk of skills){
    const d = document.createElement('div'); d.className='approval'; d.style.borderColor='var(--line)';
    d.style.alignSelf='stretch'; d.style.maxWidth='100%'; d.style.marginBottom='10px';
    d.innerHTML = `<b>${sk.name}</b> <span class="badge">[${sk.agent}] used ${sk.uses}×</span><br>`+
      `<span style="color:var(--dim)">${sk.description}</span><pre>${sk.content}</pre>`;
    const del = document.createElement('button'); del.className='no'; del.textContent='Delete';
    del.onclick = async () => { await fetch('/api/skills/'+sk.id, {method:'DELETE'}); d.remove(); toast('skill deleted'); };
    d.appendChild(del);
    $('#pane-skills').appendChild(d);
  }

  $('#pane-tools').innerHTML =
    '<p class="hint">Registered tools. Level 0 read internal · 1 read web · 2 write sandbox · '+
    '3 execute · 4 dangerous (always asks). Levels above your autonomy_level pop an approval card. '+
    '“direct” = the model may route this tool’s output straight to you.</p>'+
    '<table class="tools"><tr><th>tool</th><th>lvl</th><th></th><th>description</th></tr>'+
    s.tools.map(t=>`<tr><td><b>${t.name}</b></td><td><span class="lvl l${t.level}">${t.level}</span></td>`+
      `<td>${t.direct_ok?'<span class="direct">direct</span>':''}</td><td>${t.description}</td></tr>`).join('')+
    '</table>';
};
document.querySelectorAll('#tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); $('#pane-'+b.dataset.pane).classList.add('on');
});
async function saveConfig(){
  try{ await api('/settings/config', {_method:'PUT', yaml: $('#cfg-ed').value});
       toast('config saved & applied'); }catch(e){ toast(e.message, true); }
}

loadThreads().then(()=>openThread(1)); loadTasks(); connect();
setInterval(loadTasks, 20000);
</script>
</body>
</html>
