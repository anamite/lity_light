<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lity</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b23; --panel2:#1d242f; --line:#2a3341;
    --text:#dbe2ec; --dim:#8a97a8; --accent:#5eb0ff; --ok:#57c98a;
    --warn:#e6b455; --bad:#e0716d; --agent:#b48cf2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:15px/1.5 system-ui,Segoe UI,sans-serif;
       display:flex;height:100vh;overflow:hidden}

  /* ── sidebar ── */
  #side{width:270px;min-width:270px;background:var(--panel);border-right:1px solid var(--line);
        display:flex;flex-direction:column}
  #side h1{font-size:17px;padding:14px 16px 8px;color:var(--accent);letter-spacing:.5px}
  #side h1 small{color:var(--dim);font-weight:400;font-size:11px;margin-left:6px}
  .sect{padding:10px 12px 4px;font-size:11px;text-transform:uppercase;
        letter-spacing:1px;color:var(--dim)}
  #threads{overflow-y:auto;flex:1}
  .thread{padding:8px 16px;cursor:pointer;border-left:3px solid transparent;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}
  .thread:hover{background:var(--panel2)}
  .thread.active{background:var(--panel2);border-left-color:var(--accent)}
  .thread.kind-agent{color:var(--agent);padding-left:28px;font-size:13px}
  .thread .badge{font-size:10px;color:var(--dim)}
  #newthread{margin:10px 12px;padding:8px;background:var(--panel2);border:1px dashed var(--line);
             border-radius:8px;color:var(--dim);text-align:center;cursor:pointer;font-size:13px}
  #newthread:hover{color:var(--text)}
  #tasks{border-top:1px solid var(--line);max-height:32vh;overflow-y:auto;padding-bottom:8px}
  .task{margin:6px 12px 0;padding:6px 10px;background:var(--panel2);border-radius:8px;
        font-size:12px;color:var(--dim);cursor:pointer}
  .task b{color:var(--text)}
  .st-running{color:var(--warn)} .st-done{color:var(--ok)} .st-failed{color:var(--bad)}
  .st-blocked{color:var(--bad);font-weight:600}

  /* ── main ── */
  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  #head{padding:12px 20px;border-bottom:1px solid var(--line);display:flex;
        align-items:center;gap:10px}
  #head #title{font-weight:600}
  #gear{margin-left:auto;cursor:pointer;color:var(--dim);font-size:18px;border:none;
        background:none;padding:2px 6px}
  #gear:hover{color:var(--text)}
  #conn{width:8px;height:8px;border-radius:50%;background:var(--bad)}
  #conn.on{background:var(--ok)}
  #log{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:78%;padding:10px 14px;border-radius:12px;white-space:pre-wrap;
       word-break:break-word}
  .msg.user{align-self:flex-end;background:#274361}
  .msg.assistant{align-self:flex-start;background:var(--panel2)}
  .msg.event{align-self:center;background:none;color:var(--dim);font-size:12px;
             max-width:92%;padding:2px 8px;font-family:ui-monospace,Consolas,monospace}
  .msg img{max-width:100%;max-height:340px;border-radius:8px;display:block;margin-top:6px}
  .msg a.file{display:inline-block;margin-top:6px;color:var(--accent);text-decoration:none;
              border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:13px}
  .approval{align-self:center;background:var(--panel2);border:1px solid var(--warn);
            border-radius:12px;padding:12px 16px;max-width:88%;font-size:13px}
  .approval .tool{color:var(--warn);font-weight:600}
  .approval pre{color:var(--dim);margin:6px 0;white-space:pre-wrap;
                font-size:12px;max-height:100px;overflow:auto}
  .approval button{margin-right:8px;margin-top:4px;padding:5px 14px;border-radius:8px;
                   border:1px solid var(--line);background:var(--panel);color:var(--text);
                   cursor:pointer;font-size:13px}
  .approval button.yes{border-color:var(--ok)} .approval button.no{border-color:var(--bad)}
  .approval button:hover{background:var(--line)}
  #composer{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--line);
            align-items:flex-end}
  #attach{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
          color:var(--dim);cursor:pointer;padding:10px 12px;font-size:16px}
  #attach:hover{color:var(--text)}
  #input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
         color:var(--text);padding:10px 14px;font:inherit;resize:none;height:44px}
  #input:focus{outline:none;border-color:var(--accent)}
  #send{padding:11px 22px;border-radius:10px;border:none;background:var(--accent);
        color:#0b2135;font-weight:600;cursor:pointer}
  #send:disabled{opacity:.4}
  .typing{color:var(--dim);font-size:13px;align-self:flex-start;padding:0 6px}

  /* ── settings ── */
  #settings{display:none;flex:1;overflow-y:auto;padding:20px 24px}
  #settings.open{display:block}
  #tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  #tabs button{padding:7px 16px;border-radius:20px;border:1px solid var(--line);
               background:var(--panel);color:var(--dim);cursor:pointer;font-size:13px}
  #tabs button.on{background:var(--panel2);color:var(--accent);border-color:var(--accent)}
  .pane{display:none} .pane.on{display:block}
  .pane h3{font-size:14px;margin:14px 0 6px;color:var(--accent)}
  .pane p.hint{color:var(--dim);font-size:12px;margin-bottom:8px}
  textarea.ed{width:100%;min-height:220px;background:var(--panel);color:var(--text);
              border:1px solid var(--line);border-radius:10px;padding:12px;
              font:13px/1.5 ui-monospace,Consolas,monospace;resize:vertical}
  textarea.ed.small{min-height:120px}
  .savebtn{margin:8px 0 18px;padding:7px 18px;border-radius:8px;border:none;
           background:var(--accent);color:#0b2135;font-weight:600;cursor:pointer}
  .savebtn:hover{opacity:.9}
  #toast{position:fixed;bottom:18px;right:18px;background:var(--panel2);
         border:1px solid var(--ok);border-radius:10px;padding:10px 18px;
         display:none;font-size:13px;z-index:9}
  #toast.err{border-color:var(--bad)}
  table.tools{width:100%;border-collapse:collapse;font-size:13px}
  table.tools td,table.tools th{padding:6px 10px;border-bottom:1px solid var(--line);
                                text-align:left;vertical-align:top}
  table.tools th{color:var(--dim);font-weight:500}
  .lvl{display:inline-block;min-width:20px;text-align:center;border-radius:6px;
       background:var(--panel2);padding:1px 6px}
  .lvl.l3,.lvl.l4{color:var(--warn)}
  .direct{color:var(--ok);font-size:12px}
</style>
</head>
<body>
<aside id="side">
  <h1>Lity <small>lightweight agent</small></h1>
  <div class="sect">Threads</div>
  <div id="threads"></div>
  <div id="newthread">+ new thread</div>
  <div class="sect">Tasks</div>
  <div id="tasks"></div>
</aside>
<main id="main">
  <div id="head">
    <span id="title">Home</span><span id="conn" title="live connection"></span>
    <button id="gear" title="settings">⚙</button>
  </div>
  <div id="log"></div>
  <div id="settings">
    <div id="tabs">
      <button data-pane="config" class="on">Config</button>
      <button data-pane="files">Identity files</button>
      <button data-pane="skills">Skills</button>
      <button data-pane="tools">Tools</button>
    </div>
    <div class="pane on" id="pane-config">
      <p class="hint">config.yaml — models, budgets, autonomy level, heartbeat. Applied
      immediately on save (server host/port need a restart).</p>
      <textarea class="ed" id="cfg-ed" spellcheck="false"></textarea>
      <button class="savebtn" onclick="saveConfig()">Save config</button>
    </div>
    <div class="pane" id="pane-files"></div>
    <div class="pane" id="pane-skills"></div>
    <div class="pane" id="pane-tools"></div>
  </div>
  <div id="composer">
    <button id="attach" title="send a file">📎</button>
    <input type="file" id="fileinput" hidden>
    <textarea id="input" placeholder="Message Lity… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send">Send</button>
  </div>
</main>
<div id="toast"></div>
<script>
const $ = s => document.querySelector(s);
let current = 1, threads = [], readonly = false;

const api = (path, opts) => fetch('/api'+path, opts ? {
  method: opts._method || 'POST', headers:{'Content-Type':'application/json'},
  body: JSON.stringify(Object.fromEntries(Object.entries(opts).filter(([k])=>k!=='_method')))
} : undefined).then(async r => {
  if(!r.ok){ let d=''; try{ d=(await r.json()).detail }catch(e){} throw new Error(d||r.status); }
  return r.json();
});

function toast(msg, err){
  const t = $('#toast'); t.textContent = msg; t.className = err ? 'err' : '';
  t.style.display='block'; setTimeout(()=>t.style.display='none', 2600);
}

/* ── rendering ── */
function msgEl(m){
  const d = document.createElement('div');
  d.className = 'msg ' + (m.role==='tool' ? 'event' : m.role);
  d.textContent = m.role==='event' ? '⚙ '+m.content : m.content;
  let att = m.attachment;
  if(typeof att === 'string' && att) { try{ att = JSON.parse(att) }catch(e){ att=null } }
  if(att && att.path){
    if((att.mime||'').startsWith('image/')){
      const img = document.createElement('img');
      img.src = '/api/files/'+att.path; img.alt = att.name;
      img.onclick = () => window.open(img.src);
      d.appendChild(img);
    } else {
      const a = document.createElement('a');
      a.className='file'; a.href='/api/files/'+att.path; a.download=att.name;
      a.textContent='📎 '+att.name;
      d.appendChild(a);
    }
  }
  return d;
}
function scroll(){ const l=$('#log'); l.scrollTop = l.scrollHeight; }

async function loadThreads(){
  threads = await api('/threads');
  const box = $('#threads'); box.innerHTML = '';
  for(const t of threads){
    const d = document.createElement('div');
    d.className = 'thread kind-'+t.kind + (t.id===current?' active':'');
    d.textContent = (t.id===1?'🏠 ':'') + t.title;
    if(t.kind==='agent') d.innerHTML += ' <span class="badge">agent</span>';
    d.onclick = () => { closeSettings(); openThread(t.id); };
    box.appendChild(d);
  }
}
async function openThread(id){
  current = id;
  const t = threads.find(x=>x.id===id);
  $('#title').textContent = t ? t.title : 'Thread '+id;
  readonly = t && t.kind==='agent';
  $('#input').disabled = readonly; $('#send').disabled = readonly;
  $('#input').placeholder = readonly ? 'Agent thread — read-only'
      : 'Message Lity… (Enter to send, Shift+Enter for newline)';
  const msgs = await api(`/threads/${id}/messages`);
  const log = $('#log'); log.innerHTML = '';
  msgs.forEach(m => log.appendChild(msgEl(m)));
  await renderPendingApprovals();  // pending approvals survive reloads & thread switches
  loadThreads(); scroll();
}
async function loadTasks(){
  const tasks = await api('/tasks');
  const box = $('#tasks'); box.innerHTML = '';
  for(const t of tasks.slice(0,12)){
    const d = document.createElement('div'); d.className='task';
    d.innerHTML = `<b>#${t.id} ${t.agent}</b> <span class="st-${t.status}">${t.status}</span><br>${t.task.slice(0,60)}`;
    d.onclick = () => { closeSettings(); openThread(t.thread_id); };
    box.appendChild(d);
  }
}
function approvalCard(ev){
  // one card per approval id — never duplicate
  if(document.querySelector(`[data-aid="${ev.id}"]`)) return null;
  const d = document.createElement('div'); d.className='approval'; d.dataset.aid = ev.id;
  d.innerHTML = `Permission needed (level ${ev.level}): <span class="tool">${ev.tool}</span>
    <pre>${JSON.stringify(ev.args,null,1)}</pre>
    <div style="color:var(--dim);font-size:12px;margin-bottom:4px">The task is paused until you decide — denying stops it.</div>`;
  for(const [label,cls,dec] of [['Approve','yes','approve'],['Always allow','yes','always'],['Deny','no','deny']]){
    const b = document.createElement('button'); b.textContent=label; b.className=cls;
    b.onclick = async () => { try{ await api('/approvals/'+ev.id,{decision:dec}); }catch(e){} d.remove(); };
    d.appendChild(b);
  }
  return d;
}
async function renderPendingApprovals(){
  try{
    const pend = await api('/approvals');
    for(const p of pend){
      const card = approvalCard({id:p.id, tool:p.tool, level:p.level,
                                 args:JSON.parse(p.args_json||'{}')});
      if(card){ $('#log').appendChild(card); }
    }
    if(pend.length) scroll();
  }catch(e){}
}

/* ── live events ── */
function connect(){
  const es = new EventSource('/api/events');
  es.onopen  = () => $('#conn').classList.add('on');
  es.onerror = () => { $('#conn').classList.remove('on'); };
  es.onmessage = e => {
    const ev = JSON.parse(e.data);
    if(ev.type==='message.created'){
      if(ev.thread_id===current){ $('#log').appendChild(msgEl(ev)); scroll(); }
      hideTyping(ev);
    }
    else if(ev.type==='thread.created'){ loadThreads(); }
    else if(ev.type==='task.updated'){ loadTasks(); }
    else if(ev.type==='approval.requested'){
      const card = approvalCard(ev);
      if(card){ $('#log').appendChild(card); scroll(); }
    }
    else if(ev.type==='approval.resolved'){
      document.querySelectorAll(`[data-aid="${ev.id}"]`).forEach(x=>x.remove());
    }
  };
}
let typingEl = null;
function showTyping(){ if(typingEl) return;
  typingEl = document.createElement('div'); typingEl.className='typing';
  typingEl.textContent='Lity is thinking…'; $('#log').appendChild(typingEl); scroll(); }
function hideTyping(ev){ if(typingEl && ev.role==='assistant' && ev.thread_id===current){
  typingEl.remove(); typingEl=null; } }

/* ── composing & files ── */
async function send(){
  const text = $('#input').value.trim();
  if(!text || readonly) return;
  $('#input').value='';
  await api(`/threads/${current}/messages`, {content:text});
  showTyping();
}
$('#send').onclick = send;
$('#input').addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
$('#attach').onclick = () => { if(!readonly) $('#fileinput').click(); };
$('#fileinput').onchange = async () => {
  const f = $('#fileinput').files[0];
  if(!f) return;
  const fd = new FormData();
  fd.append('file', f);
  fd.append('caption', $('#input').value.trim());
  $('#input').value=''; $('#fileinput').value='';
  const r = await fetch(`/api/threads/${current}/files`, {method:'POST', body:fd});
  if(r.ok){ showTyping(); } else { toast('upload failed', true); }
};
$('#newthread').onclick = async () => {
  const title = prompt('Thread title:','New thread');
  if(!title) return;
  const t = await api('/threads',{title});
  await loadThreads(); closeSettings(); openThread(t.id);
};

/* ── settings dashboard ── */
let settingsOpen = false;
function closeSettings(){
  settingsOpen = false;
  $('#settings').classList.remove('open');
  $('#log').style.display='flex'; $('#composer').style.display='flex';
  $('#title').textContent = (threads.find(x=>x.id===current)||{title:'Home'}).title;
}
$('#gear').onclick = async () => {
  if(settingsOpen) return closeSettings();
  settingsOpen = true;
  $('#log').style.display='none'; $('#composer').style.display='none';
  $('#settings').classList.add('open');
  $('#title').textContent = 'Settings';
  const s = await api('/settings');
  $('#cfg-ed').value = s.config_yaml;

  const fp = $('#pane-files'); fp.innerHTML='';
  for(const [name, content] of Object.entries(s.files)){
    fp.insertAdjacentHTML('beforeend', `<h3>${name}</h3>`);
    const ta = document.createElement('textarea');
    ta.className='ed small'; ta.value=content; ta.spellcheck=false;
    const b = document.createElement('button'); b.className='savebtn'; b.textContent='Save '+name;
    b.onclick = async () => {
      try{ await api('/settings/file', {_method:'PUT', name, content: ta.value});
           toast(name+' saved'); }catch(e){ toast(e.message, true); }
    };
    fp.appendChild(ta); fp.appendChild(b);
  }

  const skills = await api('/skills');
  $('#pane-skills').innerHTML =
    '<p class="hint">Lessons distilled from completed Hermes tasks; refined in place when '+
    'repeated. Delete anything wrong or stale.</p>'+
    (skills.length ? '' : '<p class="hint">(no skills learned yet — they appear after delegated tasks complete)</p>');
  for(const sk of skills){
    const d = document.createElement('div'); d.className='approval'; d.style.borderColor='var(--line)';
    d.style.alignSelf='stretch'; d.style.maxWidth='100%'; d.style.marginBottom='10px';
    d.innerHTML = `<b>${sk.name}</b> <span class="badge">[${sk.agent}] used ${sk.uses}×</span><br>`+
      `<span style="color:var(--dim)">${sk.description}</span><pre>${sk.content}</pre>`;
    const del = document.createElement('button'); del.className='no'; del.textContent='Delete';
    del.onclick = async () => { await fetch('/api/skills/'+sk.id, {method:'DELETE'}); d.remove(); toast('skill deleted'); };
    d.appendChild(del);
    $('#pane-skills').appendChild(d);
  }

  $('#pane-tools').innerHTML =
    '<p class="hint">Registered tools. Level 0 read internal · 1 read web · 2 write sandbox · '+
    '3 execute · 4 dangerous (always asks). Levels above your autonomy_level pop an approval card. '+
    '“direct” = the model may route this tool’s output straight to you.</p>'+
    '<table class="tools"><tr><th>tool</th><th>lvl</th><th></th><th>description</th></tr>'+
    s.tools.map(t=>`<tr><td><b>${t.name}</b></td><td><span class="lvl l${t.level}">${t.level}</span></td>`+
      `<td>${t.direct_ok?'<span class="direct">direct</span>':''}</td><td>${t.description}</td></tr>`).join('')+
    '</table>';
};
document.querySelectorAll('#tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); $('#pane-'+b.dataset.pane).classList.add('on');
});
async function saveConfig(){
  try{ await api('/settings/config', {_method:'PUT', yaml: $('#cfg-ed').value});
       toast('config saved & applied'); }catch(e){ toast(e.message, true); }
}

loadThreads().then(()=>openThread(1)); loadTasks(); connect();
setInterval(loadTasks, 20000);
</script>
</body>
</html>
